<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voxel Playground</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="blocker">
      <div id="instructions">
        <h1>Voxel Playground</h1>
        <p>Click to start exploring.</p>
        <p>WASD to move, Space to jump, hold Shift to sprint.</p>
        <p>Left click removes blocks, Right click places selected blocks.</p>
        <p>Press 1-6 to switch block types.</p>
      </div>
    </div>
    <div id="hud">
      <div id="selected-block">Block: Grass</div>
    </div>
    <div id="crosshair"></div>
    <script type="module" src="main.js"></script>
  </body>
</html>
